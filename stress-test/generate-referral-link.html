<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Referral Link Generator - BeVisiblle</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 16px;
      padding: 32px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 {
      color: #1a1a1a;
      margin-bottom: 8px;
      font-size: 28px;
    }
    .subtitle {
      color: #666;
      margin-bottom: 32px;
      font-size: 14px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      color: #333;
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 14px;
    }
    input, select {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.2s;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #667eea;
    }
    .button {
      background: #667eea;
      color: white;
      border: none;
      padding: 14px 28px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
      margin-top: 8px;
    }
    .button:hover {
      background: #5568d3;
    }
    .result {
      margin-top: 24px;
      padding: 20px;
      background: #f5f5f5;
      border-radius: 8px;
      display: none;
    }
    .result.show {
      display: block;
    }
    .result-label {
      color: #666;
      font-size: 12px;
      margin-bottom: 8px;
      font-weight: 600;
    }
    .result-link {
      color: #667eea;
      word-break: break-all;
      font-size: 14px;
      margin-bottom: 12px;
    }
    .copy-button {
      background: #10b981;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      width: 100%;
    }
    .copy-button:hover {
      background: #059669;
    }
    .example {
      margin-top: 24px;
      padding: 16px;
      background: #f0f9ff;
      border-left: 4px solid #667eea;
      border-radius: 4px;
    }
    .example-title {
      font-weight: 600;
      margin-bottom: 8px;
      color: #1a1a1a;
    }
    .example-link {
      color: #667eea;
      font-size: 13px;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔗 Referral Link Generator</h1>
    <p class="subtitle">Erstelle getrackte Links für Influencer & Partner</p>

    <form id="linkForm">
      <div class="form-group">
        <label for="referralCode">Referral Code *</label>
        <input 
          type="text" 
          id="referralCode" 
          placeholder="z.B. NAKAM2024" 
          required
        />
        <small style="color: #666; font-size: 12px;">Eindeutiger Code für den Influencer/Partner</small>
      </div>

      <div class="form-group">
        <label for="referralName">Influencer/Partner Name *</label>
        <input 
          type="text" 
          id="referralName" 
          placeholder="z.B. Nakam" 
          required
        />
      </div>

      <div class="form-group">
        <label for="utmSource">UTM Source</label>
        <select id="utmSource">
          <option value="influencer">Influencer</option>
          <option value="partner">Partner</option>
          <option value="social">Social Media</option>
          <option value="email">Email</option>
          <option value="organic">Organic</option>
        </select>
      </div>

      <div class="form-group">
        <label for="utmCampaign">UTM Campaign (optional)</label>
        <input 
          type="text" 
          id="utmCampaign" 
          placeholder="z.B. january2024, launch"
        />
      </div>

      <div class="form-group">
        <label for="utmMedium">UTM Medium (optional)</label>
        <input 
          type="text" 
          id="utmMedium" 
          placeholder="z.B. referral, email, social"
        />
      </div>

      <button type="submit" class="button">Link generieren</button>
    </form>

    <div id="result" class="result">
      <div class="result-label">Dein Referral Link:</div>
      <div id="generatedLink" class="result-link"></div>
      <button id="copyButton" class="copy-button">📋 Link kopieren</button>
    </div>

    <div class="example">
      <div class="example-title">📝 Beispiel:</div>
      <div class="example-link">
        https://bevisiblle.de/cv-generator?ref=NAKAM2024&ref_name=Nakam&utm_source=influencer&utm_campaign=january2024&utm_medium=referral
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('linkForm');
    const result = document.getElementById('result');
    const generatedLink = document.getElementById('generatedLink');
    const copyButton = document.getElementById('copyButton');

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      
      const referralCode = document.getElementById('referralCode').value;
      const referralName = document.getElementById('referralName').value;
      const utmSource = document.getElementById('utmSource').value;
      const utmCampaign = document.getElementById('utmCampaign').value;
      const utmMedium = document.getElementById('utmMedium').value || 'referral';

      const baseUrl = 'https://bevisiblle.de/cv-generator';
      const params = new URLSearchParams();
      
      params.set('ref', referralCode);
      params.set('ref_name', referralName);
      params.set('utm_source', utmSource);
      params.set('utm_medium', utmMedium);
      
      if (utmCampaign) {
        params.set('utm_campaign', utmCampaign);
      }

      const link = `${baseUrl}?${params.toString()}`;
      
      generatedLink.textContent = link;
      result.classList.add('show');
    });

    copyButton.addEventListener('click', () => {
      const link = generatedLink.textContent;
      navigator.clipboard.writeText(link).then(() => {
        copyButton.textContent = '✅ Kopiert!';
        setTimeout(() => {
          copyButton.textContent = '📋 Link kopieren';
        }, 2000);
      });
    });
  </script>
</body>
</html>
